<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soy's Game Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;
  --ink:#16161a;
  --ink-soft:#6b6b76;
  --card:#f7f7f9;
  --card-border:#e7e7ec;
  --shadow:0 2px 6px rgba(20,20,30,.04), 0 10px 24px rgba(20,20,30,.05);
  --shadow-hover:0 6px 16px rgba(20,20,30,.07), 0 18px 38px rgba(20,20,30,.08);
  --ff:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--ff);min-height:100%}

.wrap{max-width:880px;margin:0 auto;padding:72px 24px 100px}

header{text-align:center;margin-bottom:56px}
.eyebrow{font-size:12px;letter-spacing:3px;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
h1{font-size:clamp(30px,6vw,46px);font-weight:800;margin:10px 0 12px;letter-spacing:-0.5px}
.tagline{color:var(--ink-soft);font-size:15px;max-width:420px;margin:0 auto;line-height:1.5}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:18px;max-width:560px;margin:0 auto}

.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:24px;
  padding:32px 20px;
  cursor:pointer;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;
  box-shadow:var(--shadow);
  transition:transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s, border-color .2s;
}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:#d8d8e0}
.card:active{transform:translateY(-1px) scale(.98)}

.card-icon{
  width:64px;height:64px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  background:var(--icon-bg,#eef0ff);
  transition:transform .2s;
}
.card:hover .card-icon{transform:scale(1.08) rotate(-4deg)}
.card-name{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.card-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4}

footer{text-align:center;margin-top:70px;color:var(--ink-soft);font-size:12px}

@media(max-width:480px){.wrap{padding:48px 18px 80px}.card{padding:24px 16px}.card-icon{width:56px;height:56px;font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">A Tiny Arcade Of</div>
    <h1>Soy's Game Lab</h1>
    <p class="tagline">Small browser games and puzzles. Tap a tile to play.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>Built with HTML · CSS · JS</footer>
</div>

<script>
/* ─── Game registry ───
   Only finished, playable games are listed here. */
const GAMES = [
  {
    name: 'Bottle Code',
    emoji: '🍾',
    desc: 'Crack the secret bottle order',
    href: 'bottle-code.html',
    iconBg: '#f1eaff'
  },
  {
    name: 'Stopwatch Snap',
    emoji: '⏱️',
    desc: 'Trust your internal clock',
    href: 'stopwatch-snap.html',
    iconBg: '#e6f7ee'
  },
  {
    name: 'Bingo Blitz',
    emoji: '🎱',
    desc: 'Race the computer to a line',
    href: 'bingo-blitz.html',
    iconBg: '#fdeede'
  },
  {
    name: 'Path Duel',
    emoji: '🎯',
    desc: 'Race to the centre — or push your opponent back',
    href: 'path-duel.html',
    iconBg: '#e8f0fe'
  },
  {
    name: 'Tic Tac Flow',
    emoji: '🔄',
    desc: 'Only 3 pieces each — shift your oldest to win',
    href: 'tic-tac-flow.html',
    iconBg: '#f0fdf4'
  },
  {
    name: 'Hand Cricket',
    emoji: '🏏',
    desc: 'Classic finger game — bat, bowl and win the toss',
    href: 'hand-cricket.html',
    iconBg: '#fffbeb'
  }
];

const grid = document.getElementById('grid');
GAMES.forEach(g=>{
  const el = document.createElement('a');
  el.href = g.href;
  el.className = 'card';
  el.style.setProperty('--icon-bg', g.iconBg);
  el.innerHTML = `
    <div class="card-icon">${g.emoji}</div>
    <div class="card-name">${g.name}</div>
    <div class="card-desc">${g.desc}</div>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
